name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lean:
    name: Lean (verify)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: leanprover/lean-action@v1

      - name: Check for banned constructs
        run: |
          if grep -rn 'sorry\|unsafe\|partial\|implemented_by\|native_decide' --include='*.lean' .; then
            echo "FAIL: banned constructs found"
            exit 1
          fi

      - name: Check for warnings
        run: |
          warnings=$(lake build 2>&1 | grep -c 'warning' || true)
          if [ "$warnings" -ne 0 ]; then
            echo "FAIL: $warnings warnings found"
            exit 1
          fi

  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Clippy (CLI)
        run: cargo clippy --manifest-path cli/Cargo.toml -- -D warnings

      - name: Clippy (launcher)
        run: cargo clippy --manifest-path launcher/Cargo.toml -- -D warnings

      - name: Test
        run: cargo test --manifest-path cli/Cargo.toml

      - name: Build
        run: |
          cargo build --release --manifest-path cli/Cargo.toml
          cargo build --release --manifest-path launcher/Cargo.toml
